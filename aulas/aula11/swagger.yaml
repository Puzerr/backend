openapi: 3.1.1
info:
  title: Minha API REST
  description: Projeto de uma API REST desenvolvida com Expressjs
  version: 0.1.0

servers:
  - url: http://localhost:3000/
    description: Ambiente de Desenvolvimento

tags:
  - name: tarefas

paths:
  /tarefas:
    get:
      summary: Lista todas as tarefas
      tags: 
        - tarefas
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  nome:
                    type: string
                  concluida:
                    type: boolean
    post:
      tags:
        - tarefas
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Tarefa"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tarefa"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error422"
  /tarefas/{id}:
    get:
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema: 
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tarefa"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error400"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error500"
    put:
      security:
        - JWTAuth: []
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                concluida:
                  type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tarefa"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error400"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error422"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error500"
    delete:
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      responses:
        "204":
          content:
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error500"
components:
    schemas:
      Tarefa:
        type: object
        properties:
          _id:
            type: string
          nome:
            type: string
          concluida:
            type: boolean
      ArrayOfTarefas:
        type: array
        items:
          $ref: "#/components/schemas/Tarefa"
      Error400:
        type: object
        properties:
          msg:
            type: string
            example: "Id inválido"
      Error422:
        type: object
        properties:
          msg:
            type: string
            example: "Nome é obrigatório"
      Error404:
        type: object
        properties:
          msg:
            type: string
            example: "Tarefa não encontrada"
      Error500:
        type: object
        properties:
          msg:
            type: string
            example: "Erro interno na API"
    securitySchemes:
      JWTAuth:
        type: http
        scheme: bearer
        in: header
        name: Authorization